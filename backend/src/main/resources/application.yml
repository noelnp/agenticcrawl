spring:
  application:
    name: agenticcrawl
  docker:
    compose:
      file: ../compose.yaml
      lifecycle-management: start_only
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/agenticcrawl}
    username: ${SPRING_DATASOURCE_USERNAME:agenticcrawl}
    password: ${SPRING_DATASOURCE_PASSWORD:agenticcrawl}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o
          temperature: 0.2

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

agenticcrawl:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
  consent:
    enabled: true
    max-passes: 3
    pause-between-passes-ms: 500
    click-timeout-ms: 2000
    # Patterns are case-insensitive substring matches against visible button/link text.
    # Reject is tried before accept on each pass.
    reject-patterns:
      - "reject"
      - "decline"
      - "only necessary"
      - "necessary only"
      - "avvisa"
      - "endast nödvändiga"
    accept-patterns:
      - "accept"
      - "allow all"
      - "agree"
      - "consent"
      - "got it"
      - "i understand"
      - "acceptera"
      - "godkänn"
      - "jag förstår"

logging:
  level:
    org.springframework.ai: INFO
    com.microsoft.playwright: INFO
    com.noelnp.agenticcrawl: DEBUG
  pattern:
    level: "%5p [job=%X{jobId:-}]"
